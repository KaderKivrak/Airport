name: BookingService CI

on:
  push:
    branches:
      - main
    paths:
      - 'BookingService/**'
      - 'BookingService.Tests/**'
  workflow_dispatch:

jobs:
  blackbox-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore BookingService.Tests/BookingService.Tests.csproj

      - name: Build
        run: dotnet build BookingService.Tests/BookingService.Tests.csproj --no-restore -p:WarningLevel=0

      - name: Run blackbox tests
        run: dotnet test BookingService.Tests/BookingService.Tests.csproj --no-build --verbosity normal --filter "FullyQualifiedName~Blackbox"

  whitebox-tests:
    runs-on: ubuntu-latest
    needs: blackbox-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore BookingService.Tests/BookingService.Tests.csproj

      - name: Build
        run: dotnet build BookingService.Tests/BookingService.Tests.csproj --no-restore -p:WarningLevel=0

      - name: Run whitebox tests
        run: dotnet test BookingService.Tests/BookingService.Tests.csproj --no-build --verbosity normal --filter "FullyQualifiedName~Whitebox"

  integration-tests:
    runs-on: ubuntu-latest
    needs: whitebox-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: BookingTestDb
          POSTGRES_USER: testdb
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore BookingService.Tests/BookingService.Tests.csproj

      - name: Build
        run: dotnet build BookingService.Tests/BookingService.Tests.csproj --no-restore -p:WarningLevel=0

      - name: Run integration tests
        run: dotnet test BookingService.Tests/BookingService.Tests.csproj --no-build --verbosity normal --filter "FullyQualifiedName~Integration"